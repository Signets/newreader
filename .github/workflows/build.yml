name: Cloud Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    name: 构建 Android APK
    runs-on: ubuntu-latest

    steps:
    - name: 📦 获取项目代码
      uses: actions/checkout@v3

    - name: ⚙️ 配置 Java 环境
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 📱 配置自动化 Flutter 云环境
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    - name: 🪄 补全缺失的安卓配置文件 (关键修复！)
      run: flutter create .

    - name: 📥 下载项目依赖包
      run: flutter pub get

    - name: 🛠️ 执行 APK 编译打包
      run: flutter build apk --release

    - name: 🚀 导出成品 APK 供扫码/下载
      uses: actions/upload-artifact@v4
      with:
        name: FluidReader-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 7
